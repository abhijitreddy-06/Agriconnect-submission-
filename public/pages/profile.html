<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main class="profile-page">
        <div class="profile-header-card">
            <div class="profile-avatar" id="profileAvatar">
                <i class="fas fa-user"></i>
            </div>
            <h1 class="profile-display-name" id="profileNameDisplay">Loading...</h1>
            <span class="role-badge" id="profileRole">--</span>
        </div>

        <div class="profile-card">
            <h2><i class="fas fa-id-card"></i> Personal Info</h2>
            <div class="profile-field">
                <label>Full Name</label>
                <div class="field-value" id="profileNameValue">Loading...</div>
                <div class="edit-row" id="editNameRow" style="display: none;">
                    <input type="text" id="profileName" placeholder="Enter your name">
                    <div class="profile-actions">
                        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-check"></i> Save</button>
                        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="profile-field">
                <label>Phone Number</label>
                <div class="field-value" id="profilePhone">Loading...</div>
            </div>
            <button class="btn-edit" id="editBtn" onclick="toggleEdit()">
                <i class="fas fa-pen"></i> Edit Name
            </button>
        </div>

        <div class="profile-card">
            <h2><i class="fas fa-chart-bar"></i> Overview</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
