<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main class="profile-page">
        <!-- Profile Header -->
        <div class="profile-header-card">
            <div class="profile-avatar" id="profileAvatar">
                <span class="avatar-emoji" id="avatarEmoji"></span>
            </div>
            <h1 class="profile-display-name" id="profileNameDisplay">Loading...</h1>
            <span class="role-badge" id="profileRole">--</span>
            <p class="member-since" id="memberSince"></p>
        </div>

        <!-- Quick Stats -->
        <div class="stats-row" id="statsRow"></div>

        <!-- Personal Info -->
        <div class="profile-card">
            <h2><i class="fas fa-id-card"></i> Personal Information</h2>
            <div class="profile-field">
                <label>Full Name</label>
                <div class="field-display" id="nameDisplay">
                    <span class="field-value" id="profileNameValue">Loading...</span>
                    <button class="btn-inline-edit" id="editNameBtn" onclick="toggleEdit()">
                        <i class="fas fa-pen"></i> Edit
                    </button>
                </div>
                <div class="field-edit" id="nameEditRow" style="display: none;">
                    <input type="text" id="profileNameInput" placeholder="Enter your name" maxlength="50">
                    <div class="edit-actions">
                        <button class="btn-save" id="saveBtn" onclick="saveProfile()">
                            <i class="fas fa-check"></i> Save
                        </button>
                        <button class="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="profile-field">
                <label>Phone Number</label>
                <div class="field-display">
                    <span class="field-value" id="profilePhone">Loading...</span>
                    <span class="field-readonly-badge"><i class="fas fa-lock"></i> Read-only</span>
                </div>
            </div>
            <div class="profile-field">
                <label>Role</label>
                <div class="field-display">
                    <span class="field-value" id="profileRoleText">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="profile-card">
            <h2><i class="fas fa-clock"></i> Recent Activity</h2>
            <div id="recentActivity">
                <div class="activity-loading">Loading recent orders...</div>
            </div>
        </div>

        <!-- Account Actions -->
        <div class="profile-card account-actions-card">
            <h2><i class="fas fa-cog"></i> Account</h2>
            <div class="account-actions">
                <button class="btn-action btn-logout" id="profileLogoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Log Out
                </button>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
