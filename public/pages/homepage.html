<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Home - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/homepage.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <!-- Main content section -->
    <main>
        <!-- Main container for welcome message and call-to-action -->
        <div class="main-container">
            <h1>Welcome to AgriConnect!</h1>
            <p>
                Discover the world of agriculture with our powerful and user-friendly
                platform.
            </p>
            <!-- Button to navigate to the Check Plant Health page -->
            <button class="main-button" onclick="window.location.href='/plant-health'">
                Get Solution for your Plants Problem
            </button>
            <!-- Button to navigate to the Farmers’ Market page -->
            <button class="main-button" onclick="window.location.href='/marketplace/farmer'">
                Farmer market
            </button>
        </div>
    </main>

    <!-- Footer section -->
<footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/homepage.js"></script>

</html>
