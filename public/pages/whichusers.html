<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/whichusers.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="main-content">
            <div class="cards-container">
                <div class="card">
                    <div class="card-icon customer-icon">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <h2>Customer</h2>
                    <p class="card-desc">Browse and buy fresh agricultural products directly from farmers.</p>
                    <button class="btn" onclick="window.location.href='/signup/customer'">Continue as Customer</button>
                </div>
                <div class="card">
                    <div class="card-icon farmer-icon">
                        <i class="fas fa-seedling"></i>
                    </div>
                    <h2>Farmer</h2>
                    <p class="card-desc">List your products, manage orders, and grow your business.</p>
                    <button class="btn" onclick="window.location.href='/signup/farmer'">Continue as Farmer</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/whichusers.js"></script>
</body>
</html>
