<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login-cus.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="auth-wrapper">
            <div class="auth-brand">
                <div class="brand-content">
                    <i class="fas fa-shopping-bag brand-icon"></i>
                    <h2>AgriConnect</h2>
                    <p>Fresh farm produce delivered directly to your doorstep. Skip the middlemen, support local farmers.</p>
                </div>
            </div>
            <div class="auth-form-side">
                <div class="login-container">
                    <form class="login-form" action="#" method="post" onsubmit="return false;">
                        <h2>Login as Customer</h2>

                        <div class="input-group">
                            <label for="phone">Phone number</label>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your Phone number"
                                pattern="[0-9]{10}" required>
                        </div>

                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="password-container">
                                <input type="password" id="password" name="password" placeholder="Enter Password" required>
                            </div>
                        </div>

                        <button type="submit" class="login-btnn">Login</button>

                        <p class="signup-link">Don't have an account? <a href="/signup/customer">Sign up</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
