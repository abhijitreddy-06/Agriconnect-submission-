<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/orders.css">
</head>
<body>
    <div id="global-loader"><div class="loader-spinner"></div></div>
    <div class="body-bg"></div>

    <header></header>

    <!-- Orders Content -->
    <main class="orders-page">
        <div class="orders-header">
            <h1><i class="fas fa-box"></i> My Orders</h1>
        </div>

        <!-- Empty state -->
        <div class="empty-orders" id="emptyOrders" style="display:none;">
            <i class="fas fa-box-open"></i>
            <h2>No orders yet</h2>
            <p id="emptyMessage">Start shopping to see your orders here.</p>
        </div>

        <!-- Orders list -->
        <div class="orders-list" id="ordersList">
            <!-- Order cards injected here -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="ordersPagination"></div>
    </main>

    <!-- Footer -->

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/orders.js"></script>
</body>
</html>
