<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main class="profile-page">
        <div class="profile-card">
            <h2><i class="fas fa-user-circle"></i> My Profile</h2>
            <div class="profile-field">
                <label>Name</label>
                <input type="text" id="profileName" placeholder="Your name">
            </div>
            <div class="profile-field">
                <label>Phone Number</label>
                <div class="field-value" id="profilePhone">&mdash;</div>
            </div>
            <div class="profile-field">
                <label>Role</label>
                <span class="role-badge" id="profileRole">&mdash;</span>
            </div>
            <div class="profile-actions">
                <button class="btn-save" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>

        <div class="profile-card">
            <h2><i class="fas fa-chart-bar"></i> Overview</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
