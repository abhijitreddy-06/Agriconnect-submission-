<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/chat.css">
</head>
<body>
    <div id="global-loader"><div class="loader-spinner"></div></div>
    <div class="body-bg"></div>

    <header></header>

    <main class="chat-page">
        <div class="chat-container">
            <!-- Chat Header -->
            <div class="chat-header">
                <a href="/orders" class="chat-back"><i class="fas fa-arrow-left"></i></a>
                <div class="chat-header-info">
                    <h2 id="chatPartnerName">Loading...</h2>
                    <span class="chat-product" id="chatProductName"></span>
                </div>
                <span class="chat-status-badge" id="chatStatusBadge">pending</span>
            </div>

            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty" id="chatEmpty">
                    <i class="fas fa-comments"></i>
                    <p>No messages yet. Start the conversation!</p>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="chat-input-area" id="chatInputArea">
                <div class="char-counter"><span id="charCount">0</span>/300</div>
                <div class="chat-input-row">
                    <input type="text" id="chatInput" placeholder="Type a message..." maxlength="300" autocomplete="off" />
                    <button id="chatSendBtn" title="Send"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="chat-rate-info" id="chatRateInfo"></div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
