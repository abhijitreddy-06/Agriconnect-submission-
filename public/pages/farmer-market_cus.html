<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/farmer-market-cus.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="search-container">
            <div class="input-group">
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." />
            </div>
            </div>

    <!-- Category Filter Pills -->
    <div class="category-filters" id="categoryFilters">
        <button class="category-pill active" data-category="">All</button>
        <button class="category-pill" data-category="Vegetables">Vegetables</button>
        <button class="category-pill" data-category="Fruits">Fruits</button>
        <button class="category-pill" data-category="Grains & Cereals">Grains & Cereals</button>
        <button class="category-pill" data-category="Pulses & Legumes">Pulses & Legumes</button>
        <button class="category-pill" data-category="Spices">Spices</button>
        <button class="category-pill" data-category="Dairy">Dairy</button>
        <button class="category-pill" data-category="Nuts & Seeds">Nuts & Seeds</button>
        <button class="category-pill" data-category="Organic">Organic</button>
    </div>
    <!-- Hero section with banner image and text -->
    <div class="hero-section">
        <div class="hero-text">
            <h1>Farmer Bazaar</h1>
            <p>One of India's largest marketplace to BUY, SELL & RENT Agriculture products.</p>
        </div>
    </div>

    <!-- Main container for marketplace content -->
    <div class="container">
        <!-- Marketplace section where product cards will be dynamically injected -->
        <div class="marketplace" id="marketplace">
            <!-- Product cards will be injected here -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Modal for detailed product view -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <!-- Close button for the modal -->
            <span class="close" onclick="closeModal()">&times;</span>
            <!-- Product image -->
            <img id="modalImage" src="" alt="Product Image" />
            <!-- Product name -->
            <h3 id="modalName"></h3>
            <!-- Product price -->
            <p id="modalPrice"></p>
            <!-- Product quantity -->
            <p id="modalQuantity"></p>
            <!-- Product quality -->
            <p id="modalQuality"></p>
            <!-- Product description -->
            <p id="modalDescription"></p>
            <!-- Quantity selector + Add to Cart -->
            <div style="display:flex; align-items:center; gap:1rem; margin-top:1rem; flex-wrap:wrap;">
                <label style="font-weight:600;">Qty:</label>
                <input type="number" id="modalQtyInput" value="1" min="1" max="9999"
                    style="width:80px; padding:0.5rem; border:2px solid #e0e0e0; border-radius:6px; font-size:1rem;" />
                <button id="modalAddBtn" onclick="addModalToCart()"
                    style="flex:1; min-width:150px; padding:0.75rem 1.5rem; background:#5da399; color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-size:1rem;">🛒
                    Add to Cart</button>
            </div>
        </div>
    </div>

    <!-- Footer section -->
    </main>
    
    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/market.js"></script>
</body>
</html>
