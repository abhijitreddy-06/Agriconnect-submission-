<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Login - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <!-- Main content section -->
    <main>
        <!-- Container for the login form -->
        <div class="logincontainer">
            <div class="login-container">
                <!-- Login form for Farmer login -->
                <form class="login-form" action="#" method="post" onsubmit="return false;">
                    <h2>Login as Farmer</h2>

                    <!-- Input group for phone number -->
                    <div class="input-group">
                        <label for="phone">Phone number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your Phone number" required>
                    </div>

                    <!-- Input group for password -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" placeholder="Enter Password">
                        </div>
                    </div>

                    <!-- Login submission button -->
                    <button type="submit" class="login-btnn">Login</button>

                    <!-- Link to the sign-up page -->
                    <p class="signup-link">Don't have an account? <a href="/signup/farmer">Sign up</a></p>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer Section -->
<footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
