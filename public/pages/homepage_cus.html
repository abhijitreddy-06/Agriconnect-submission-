<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Home - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/homepage-cus.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <section class="welcome-banner">
            <h1>Welcome back!</h1>
            <p>Browse fresh products from local farmers and get them delivered to your door.</p>
        </section>

        <section class="dashboard-grid">
            <a href="/marketplace/customer" class="dash-card">
                <div class="dash-icon warm-icon">
                    <i class="fas fa-store"></i>
                </div>
                <h3>Farmer Bazaar</h3>
                <p>Explore fresh produce direct from farmers</p>
            </a>
            <a href="/cart" class="dash-card">
                <div class="dash-icon accent-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <h3>My Cart</h3>
                <p>Review items and proceed to checkout</p>
            </a>
            <a href="/orders" class="dash-card">
                <div class="dash-icon primary-icon">
                    <i class="fas fa-box"></i>
                </div>
                <h3>Orders</h3>
                <p>Track all your current and past orders</p>
            </a>
        </section>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/homepage-cus.js"></script>
</body>
</html>
