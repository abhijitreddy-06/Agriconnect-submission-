<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/my-products.css">
</head>
<body>
    <div id="global-loader"><div class="loader-spinner"></div></div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <section class="page-banner">
            <h1><i class="fas fa-box-open"></i> My Products</h1>
            <p>Manage your listed products — edit details or remove listings</p>
        </section>

        <div class="toolbar">
            <div class="product-count" id="productCount"></div>
            <a href="/sell" class="add-btn"><i class="fas fa-plus"></i> Add Product</a>
        </div>

        <div class="products-container" id="productsContainer">
            <div class="loading-state"><i class="fas fa-spinner fa-spin"></i> Loading your products...</div>
        </div>

        <!-- Edit Modal -->
        <div class="modal-overlay" id="editModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Product</h3>
                    <button class="modal-close" onclick="closeEditModal()">&times;</button>
                </div>
                <form id="editForm" onsubmit="return false;">
                    <div class="edit-grid">
                        <div class="form-group">
                            <label for="editName">Product Name</label>
                            <input type="text" id="editName" class="input-field" required>
                        </div>
                        <div class="form-group">
                            <label for="editCategory">Category</label>
                            <select id="editCategory" class="input-field">
                                <option value="Vegetables">Vegetables</option>
                                <option value="Fruits">Fruits</option>
                                <option value="Grains & Cereals">Grains & Cereals</option>
                                <option value="Pulses & Legumes">Pulses & Legumes</option>
                                <option value="Spices">Spices</option>
                                <option value="Dairy">Dairy</option>
                                <option value="Nuts & Seeds">Nuts & Seeds</option>
                                <option value="Organic">Organic</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editPrice">Price</label>
                            <input type="number" id="editPrice" class="input-field" step="0.01" min="0" max="20000" required>
                        </div>
                        <div class="form-group">
                            <label for="editQuantity">Quantity</label>
                            <input type="number" id="editQuantity" class="input-field" step="0.01" min="0" max="2000" required>
                        </div>
                        <div class="form-group">
                            <label for="editQuality">Quality</label>
                            <select id="editQuality" class="input-field">
                                <option value="Premium">Premium</option>
                                <option value="Standard">Standard</option>
                                <option value="Economy">Economy</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editUnit">Unit</label>
                            <select id="editUnit" class="input-field">
                                <option value="kilogram">Kilogram</option>
                                <option value="gram">Gram</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="editDescription">Description</label>
                        <textarea id="editDescription" class="input-field" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editImage">Update Image (optional)</label>
                        <input type="file" id="editImage" class="input-field" accept="image/*">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                        <button type="submit" class="btn-save" id="saveBtn">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/my-products.js"></script>
</body>
</html>
