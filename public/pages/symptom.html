<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Health Check - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/symptom.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="upload-container">
            <div class="upload-card">
                <div class="upload-header">
                    <i class="fas fa-leaf"></i>
                    <h1>Plant Health Check</h1>
                    <p>Upload a photo of your plant to detect diseases</p>
                </div>

                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>Drag & drop your plant image here</p>
                        <span>or</span>
                        <label for="imageInput" class="browse-btn">Browse Files</label>
                        <input type="file" id="imageInput" name="imageInput" accept="image/*" required hidden />
                        <p class="file-hint">Supports JPG, PNG, WebP (max 5MB)</p>
                    </div>

                    <div class="preview-section" id="previewSection" style="display: none;">
                        <img id="imagePreview" src="" alt="Plant image preview" />
                        <button type="button" class="remove-preview" id="removePreview">
                            <i class="fas fa-times"></i> Remove
                        </button>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn" disabled>
                        <i class="fas fa-search"></i> Analyze Plant
                    </button>
                </form>
            </div>
        </div>

        <div id="analysis-loader" class="analysis-loader" style="display: none;">
            <div class="loader-content">
                <div class="loader-spinner"></div>
                <div class="loader-text">Analyzing plant health...</div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/symptom.js"></script>
</body>
</html>
