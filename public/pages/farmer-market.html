<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Market - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/farmer-market.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="search-container">
            <div class="input-group">
            <input type="text" class="search-input" id="searchInput" placeholder="Search products..." />
            </div>
            </div>
    <!-- Hero section with banner image and text -->
    <div class="hero-section">
        <div class="hero-text">
            <h1>Farmer Bazaar is One of India’s Largest Marketplace.</h1>
            <p>User Can BUY, SELL & RENT Agriculture.</p>
        </div>
        <!-- Replace /farmer-bg with your actual banner image path -->
        <img src="https://images.unsplash.com/photo-1488459716781-31db52582fe9?w=1200&q=80" alt="Farmer Bazaar" class="hero-image" />
    </div>

    <!-- Main container for marketplace content -->
    <div class="container">
        <!-- Marketplace grid; product cards will be injected here dynamically -->
        <div class="marketplace" id="marketplace">
            <!-- Product cards will be injected here -->
        </div>
    </div>

    <!-- Modal for detailed product view -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <!-- Close button -->
            <span class="close" onclick="closeModal()">&times;</span>
            <!-- Product image -->
            <img id="modalImage" src="" alt="Product Image" />
            <!-- Product details -->
            <h3 id="modalName"></h3>
            <p id="modalPrice"></p>
            <p id="modalQuantity"></p>
            <p id="modalQuality"></p>
            <p id="modalDescription"></p>
            <p id="modalContact"></p>
        </div>
    </div>

    <!-- Footer section -->
    </main>
    
    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/farmer-market.js"></script>
</body>
</html>
