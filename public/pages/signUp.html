<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Sign Up - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/signup.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <main>
        <div class="auth-wrapper">
            <div class="auth-brand">
                <div class="brand-content">
                    <i class="fas fa-seedling brand-icon"></i>
                    <h2>Join AgriConnect</h2>
                    <p>Start selling your produce directly to customers. AI crop diagnostics included free.</p>
                </div>
            </div>
            <div class="auth-form-side">
                <div class="signup-box">
                    <form class="signup-form" method="post" action="#" onsubmit="return false;">
                        <h2>Sign up as Farmer</h2>
                        <div class="input-group">
                            <label for="username">Your Name</label>
                            <input type="text" id="username" name="username" placeholder="Enter your Name..." required>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone number</label>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your Phone number..." required>
                        </div>
                        <div class="input-group">
                            <label for="password">Create Password</label>
                            <div class="password-container">
                                <input type="password" id="password" name="password" placeholder="Create a Password..." required>
                                <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
                            </div>
                        </div>
                        <button type="submit" class="signup-btn">Sign Up</button>
                        <p>Already have an account? <a href="/login/farmer" class="signup-link">Login</a></p>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/signup.js"></script>
</body>
</html>
