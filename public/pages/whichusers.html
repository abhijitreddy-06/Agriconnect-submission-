<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - AgriConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/whichusers.css">
</head>
<body>
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>
    <div class="body-bg"></div>

    <header></header>

    <!-- Main content area -->
    <main>
        <!-- Loading Overlay -->
        <div id="loadingOverlay" style="display: none;">
            <div class="spinner"></div>
        </div>
        <!-- Container for the main content -->
        <div class="main-content">
            <!-- Container for selection cards -->
            <div class="cards-container">
                <!-- Card for Customer selection -->
                <div class="card">
                    <img src="/customer" alt="Customer">
                    <h2>Are you a Customer?</h2>
                    <button class="btn" onclick="window.location.href='/signup/customer'">Login as Customer</button>
                </div>
                <!-- Card for Farmer selection -->
                <div class="card">
                    <img src="/ind_farmer" alt="Farmer">
                    <h2>Are you a Farmer?</h2>
                    <button class="btn" onclick="window.location.href='/signup/farmer'">Login as Farmer</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer section -->
<footer class="footer"></footer>

    <script src="/js/auth.js"></script>
    <script src="/js/components.js"></script>
    <script src="/js/whichusers.js"></script>
</body>
</html>
