<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta information and viewport settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriConnect</title>

    <!-- Link to local CSS file for styling -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/footer.css">

    <!-- Link to Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts: Nunito font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">

</head>

<body class="h">
    <!-- Background element for styling purposes -->
    <div class="body-bg"></div>
    <!-- Global loader element -->
    <div id="global-loader">
        <div class="loader-spinner"></div>
    </div>

    <!-- Header section containing the navigation bar -->
    <header>
        <nav class="navbar">
            <!-- Logo for AgriConnect -->
            <div class="logo">AgriConnect</div>

            <!-- Navigation Links -->
            <ul class="nav-links">
                <li><a href="/" data-translate>🏠Home</a></li>
                <li><a href="/whichusers" data-translate>🌾Farming Guide</a></li>
                <li><a href="/whichusers" data-translate>🌿Check Plant Health </a></li>
                <li><a href="/whichusers" data-translate>🛒Farmers’ Market</a></li>
            </ul>

            <!-- Dropdown for language selection -->
            <div class="dropdown">
                <!-- Button that triggers the language dropdown -->
                <button class="dropbtn" onclick="toggleDropdown(this)">Language</button>
                <!-- Dropdown content with available languages -->
                <div class="dropdown-content">
                    <a href="">English</a>
                    <a href="">Kannada</a>
                </div>
            </div>

            <!-- Sign-up Button -->
            <button class="login-btn" onclick="window.location.href='/whichusers'">Sign-up</button>

            <!-- Hamburger menu for mobile navigation -->
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </nav>
    </header>

    <!-- Main content section -->
    <main>
        <!-- Main container for the welcome message and call-to-action -->
        <div class="main-container">
            <h1>Welcome to AgriConnect!</h1>
            <p>Discover the world of agriculture with our powerful and user-friendly platform.</p>
            <!-- Button to navigate to the Check Plant Health page -->
            <button class="main-button" onclick="window.location.href='/whichusers'">
                Get Started for free
            </button>

        </div>
    </main>

    <!-- Footer section -->
    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">
                &copy; 2025 Built by
                <a href="https://abhijitreddy-portfolio.netlify.app/" class="footer-author" target="_blank">
                    Abhijit Reddy 😊
                </a>
            </p>
            <div class="social-links">
                <a href="https://www.linkedin.com/in/abhijitreddy75" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="https://github.com/abhijitreddy-06" target="_blank" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://leetcode.com/u/MWMznGTyFG/" target="_blank" title="LeetCode">
                    <i class="fas fa-code"></i>
                </a>
            </div>
        </div>
    </footer>


</body><script src="/js/index.js"></script>

</html>
